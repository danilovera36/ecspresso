<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ecspresso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-editor { font-family: 'Fira Code', monospace; font-size: 13px; line-height: 1.6; tab-size: 2; resize: none; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans antialiased">
    
    <!-- Vista Login -->
    <div id="login-view" class="flex items-center justify-center min-h-screen bg-gray-950 p-6">
        <div class="w-full max-w-md glass rounded-2xl p-8 space-y-8 shadow-2xl">
            <div class="text-center">
                <img src="/static/ecspreso.png" alt="Logo" class="w-20 h-20 mx-auto mb-4 object-contain">
                <h1 class="text-3xl font-bold text-white tracking-tight">Bienvenido</h1>
                <p class="text-gray-400 mt-2">Ingresa a ecspresso</p>
            </div>
            <form id="login-form" class="space-y-6" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Usuario</label>
                    <input id="login-user" type="text" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Contraseña</label>
                    <input id="login-pass" type="password" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-900/20 transition-all">
                    Iniciar Sesión
                </button>
                <div id="login-error" class="hidden text-red-400 text-sm text-center"></div>
            </form>
        </div>
    </div>

    <!-- Vista Principal (App) -->
    <div id="app-view" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 bg-gray-900 border-r border-gray-800 p-6 flex flex-col justify-between shrink-0">
            <div>
                <div class="flex items-center gap-2 mb-10">
                    <img src="/static/ecspreso.png" alt="ecspresso Logo" class="w-10 h-10 object-contain">
                    <span class="text-xl font-bold tracking-tight text-white">ecspresso</span>
                </div>
                <nav class="space-y-2">
                    <button onclick="showView('variables')" id="btn-variables" class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm text-gray-400 hover:bg-gray-800 hover:text-gray-200"><span>🚀</span> Variables & Secrets</button>
                    <button onclick="showView('taskdef')" id="btn-taskdef" class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm bg-gray-800/50 text-emerald-400 font-medium"><span>📄</span> Task Definitions</button>
                </nav>
            </div>
            <div class="border-t border-gray-800 pt-4">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm text-red-400 hover:bg-red-900/20 transition-colors">
                    <span>🚪</span> Cerrar Sesión
                </button>
            </div>
        </aside>
        
        <main class="flex-1 overflow-hidden flex flex-col">
            <header class="bg-gray-900/80 backdrop-blur-sm border-b border-gray-800 px-8 py-4 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="text-gray-500 text-sm">App:</span>
                        <select id="app-selector" class="bg-gray-800 border border-gray-700 text-white text-xl font-bold rounded-lg px-4 py-2 w-64">
                            <option value="payment-service">payment-service</option>
                        </select>
                    </div>
                    <select id="env-selector" class="bg-gray-800 border border-gray-700 text-gray-300 text-sm rounded-lg px-4 py-2">
                        <option>production</option><option>staging</option><option selected>development</option>
                    </select>
                </div>
            </header>

            <div id="view-variables" class="flex-1 overflow-y-auto p-8 space-y-6 hidden">
                <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
                    <h2 class="text-white font-semibold mb-4">Variables Existentes</h2>
                    <div id="existing-variables" class="space-y-2 mb-6">
                        <!-- Variables will be loaded here dynamically -->
                        <p class="text-gray-400 text-sm">No hay variables cargadas aún.</p>
                    </div>
                    <h2 class="text-white font-semibold mb-4">Agregar Variable</h2>
                    <div class="grid grid-cols-3 gap-4">
                        <input id="var-key" type="text" placeholder="KEY (ej: PORT)" class="bg-gray-950 border border-gray-700 rounded-lg p-2 text-sm focus:ring-emerald-500">
                        <input id="var-value" type="text" placeholder="VALUE (ej: 8080)" class="bg-gray-950 border border-gray-700 rounded-lg p-2 text-sm focus:ring-emerald-500">
                        <button onclick="saveVar()" class="bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm transition-colors">Guardar</button>
                    </div>
                </div>
                <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
                    <h2 class="text-white font-semibold mb-4">Secretos Existentes</h2>
                    <div id="existing-secrets" class="space-y-2 mb-6">
                        <!-- Secrets will be loaded here dynamically -->
                        <p class="text-gray-400 text-sm">No hay secretos cargados aún.</p>
                    </div>
                    <h2 class="text-white font-semibold mb-4">Agregar Secret (AWS SSM)</h2>
                    <div class="grid grid-cols-3 gap-4">
                        <input id="sec-key" type="text" placeholder="KEY" class="bg-gray-950 border border-gray-700 rounded-lg p-2 text-sm focus:ring-emerald-500">
                        <input id="sec-value" type="password" placeholder="VALUE REAL" class="bg-gray-950 border border-gray-700 rounded-lg p-2 text-sm focus:ring-emerald-500">
                        <button onclick="saveSec()" class="bg-amber-600 hover:bg-amber-500 text-white rounded-lg text-sm transition-colors">Guardar en AWS</button>
                    </div>
                </div>
                <div id="msg-box" class="hidden rounded-lg p-4 text-sm border"></div>
            </div>

            <div id="view-taskdef" class="flex-1 flex overflow-hidden p-6 gap-6">
                <div class="w-1/2 flex flex-col bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-800 flex justify-between items-center bg-gray-900 shrink-0">
                        <span class="text-sm text-gray-300 font-medium">📝 Plantilla Base (JSON)</span>
                        <button onclick="saveTemplate()" class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-3 py-1 rounded transition-colors">💾 Guardar</button>
                    </div>
                    <div class="px-4 py-2 bg-gray-950/50 border-b border-gray-800 flex items-center gap-4 shrink-0">
                        <label class="text-xs text-gray-400">Inyectar en contenedor:</label>
                        <input id="target-container" type="text" value="app-main" class="bg-gray-800 border border-gray-700 text-emerald-400 text-xs rounded px-2 py-1 w-48 focus:outline-none">
                    </div>
                    <textarea id="base-td" class="json-editor w-full flex-1 p-4 bg-gray-950 text-gray-300 focus:outline-none focus:ring-1 focus:ring-emerald-500/50">{
  "family": "NOMBRE_APP-dev",
  "networkMode": "awsvpc",
  "requiresCompatibilities": ["FARGATE"],
  "cpu": "256",
  "memory": "512",
  "containerDefinitions": [
    {
      "name": "app-main",
      "image": "ECR_URI:latest",
      "essential": true,
      "portMappings": [{ "containerPort": 8080 }],
      "environment": [
        { "name": "FIJO_EN_JSON", "value": "NO_BORRAR" }
      ],
      "secrets": []
    }
  ]
}</textarea>
                </div>
                <div class="w-1/2 flex flex-col bg-gray-900 rounded-xl border border-emerald-500/30 overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-800 flex justify-between items-center bg-gray-900 shrink-0">
                        <span class="text-sm text-gray-300 font-medium">⚡ Output Final (Smart Merge)</span>
                        <div class="flex gap-2">
                            <button onclick="fetchTD()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-3 py-1.5 rounded-md text-xs transition-colors">🍵 Fetch from API</button>
                            <button onclick="copyTD()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-md text-xs transition-colors">Copiar 📋</button>
                        </div>
                    </div>
                    <textarea id="output-td" readonly class="json-editor w-full flex-1 p-4 bg-gray-950 text-green-400 focus:outline-none cursor-not-allowed text-xs">{ "message": "Haz clic en 'Fetch from API'..." }</textarea>
                </div>
            </div>
        </main>
    </div>

    <script>
        const BASE_URL = window.location.origin;
        let TOKEN = localStorage.getItem('ecspresso_token');

        function checkAuth() {
            if (TOKEN) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                showView('taskdef');
                loadApps(); // Cargar la lista de aplicaciones
            } else {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const errorBox = document.getElementById('login-error');

            const formData = new FormData();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const res = await fetch(`${BASE_URL}/api/v1/auth/login`, { method: "POST", body: formData });
                if (!res.ok) throw new Error('Credenciales inválidas');
                const data = await res.json();
                TOKEN = data.access_token;
                localStorage.setItem('ecspresso_token', TOKEN);
                checkAuth();
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.classList.remove('hidden');
            }
        }

        function logout() {
            TOKEN = null;
            localStorage.removeItem('ecspresso_token');
            checkAuth();
        }

        function getCurrentApp() { return document.getElementById('app-selector').value.trim(); }
        function getCurrentEnv() { return document.getElementById('env-selector').value; }

        async function loadApps() {
            try {
                const data = await apiCall("/api/v1/apps");
                const appSelector = document.getElementById('app-selector');
                // Limpiar opciones existentes excepto la primera
                while (appSelector.options.length > 1) {
                    appSelector.remove(1);
                }
                // Agregar las aplicaciones obtenidas de la API
                data.forEach(app => {
                    const option = document.createElement('option');
                    option.value = app.name;
                    option.textContent = app.name;
                    appSelector.appendChild(option);
                });
            } catch (e) {
                console.error("Error loading apps:", e);
            }
        }

        async function loadVariables() {
            try {
                const app = getCurrentApp();
                const env = getCurrentEnv();
                const data = await apiCall(`/api/v1/variables?app_name=${app}&environment=${env}`);
                const container = document.getElementById('existing-variables');
                
                if (data.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-sm">No hay variables para esta aplicación y entorno.</p>';
                    return;
                }
                
                let html = '<div class="grid grid-cols-2 gap-2 text-sm">';
                data.forEach(variable => {
                    html += `
                        <div class="bg-gray-800 rounded p-2">
                            <div class="font-medium text-emerald-400">${variable.key}</div>
                            <div class="text-gray-300 break-all">${variable.value}</div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (e) {
                console.error("Error loading variables:", e);
                document.getElementById('existing-variables').innerHTML = '<p class="text-red-400 text-sm">Error al cargar variables: ' + e.message + '</p>';
            }
        }

        async function loadSecrets() {
            try {
                const app = getCurrentApp();
                const env = getCurrentEnv();
                const data = await apiCall(`/api/v1/secrets?app_name=${app}&environment=${env}`);
                const container = document.getElementById('existing-secrets');
                
                if (data.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-sm">No hay secretos para esta aplicación y entorno.</p>';
                    return;
                }
                
                let html = '<div class="grid grid-cols-1 gap-2 text-sm">';
                data.forEach(secret => {
                    html += `
                        <div class="bg-gray-800 rounded p-2">
                            <div class="font-medium text-amber-400">${secret.key}</div>
                            <div class="text-gray-300 text-xs break-all">${secret.ssm_path}</div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (e) {
                console.error("Error loading secrets:", e);
                document.getElementById('existing-secrets').innerHTML = '<p class="text-red-400 text-sm">Error al cargar secretos: ' + e.message + '</p>';
            }
        }

        function showView(view) {
            document.getElementById('view-variables').classList.add('hidden');
            document.getElementById('view-taskdef').classList.add('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('bg-gray-800/50', 'text-emerald-400', 'font-medium'); btn.classList.add('text-gray-400'); });
            if (view === 'variables') { 
                document.getElementById('view-variables').classList.remove('hidden'); 
                document.getElementById('btn-variables').classList.add('bg-gray-800/50', 'text-emerald-400', 'font-medium');
                // Cargar variables y secretos cuando se muestra la vista
                loadVariables();
                loadSecrets();
            }
            else { document.getElementById('view-taskdef').classList.remove('hidden'); document.getElementById('btn-taskdef').classList.add('bg-gray-800/50', 'text-emerald-400', 'font-medium'); }
        }

        function showMsg(text, isError = false) { 
            const box = document.getElementById('msg-box'); 
            box.classList.remove('hidden', 'bg-gray-800', 'border-gray-700', 'text-emerald-400', 'bg-red-900/30', 'border-red-500', 'text-red-400');
            if(isError) { box.classList.add('bg-red-900/30', 'border-red-500', 'text-red-400'); }
            else { box.classList.add('bg-gray-800', 'border-gray-700', 'text-emerald-400'); }
            box.innerText = text; 
            setTimeout(() => box.classList.add('hidden'), 5000); 
        }

        async function apiCall(endpoint, method = "GET", body = null) {
            const headers = { "Authorization": `Bearer ${TOKEN}` };
            if (body) headers["Content-Type"] = "application/json";

            const res = await fetch(BASE_URL + endpoint, { method, headers, body: body ? JSON.stringify(body) : null });
            
            if (res.status === 401) { logout(); return; }
            if (!res.ok) {
                const errorData = await res.json();
                const msg = Array.isArray(errorData.detail) ? errorData.detail.map(e => e.msg).join(', ') : errorData.detail;
                throw new Error(msg || 'Error en el API');
            }
            return res.json();
        }

        async function saveVar() {
            try {
                const res = await apiCall("/api/v1/variables", "POST", { app_name: getCurrentApp(), environment: getCurrentEnv(), key: document.getElementById('var-key').value, value: document.getElementById('var-value').value });
                showMsg("✅ " + res.message); 
                document.getElementById('var-key').value=""; document.getElementById('var-value').value="";
            } catch (e) { showMsg("❌ " + e.message, true); }
        }

        async function saveSec() {
            try {
                const res = await apiCall("/api/v1/secrets", "POST", { app_name: getCurrentApp(), environment: getCurrentEnv(), key: document.getElementById('sec-key').value, value: document.getElementById('sec-value').value });
                showMsg("🔒 " + res.message);
                document.getElementById('sec-key').value=""; document.getElementById('sec-value').value="";
            } catch (e) { showMsg("❌ " + e.message, true); }
        }

        async function saveTemplate() {
            try {
                const res = await apiCall(`/api/v1/apps/${getCurrentApp()}/td/template`, "POST", { environment: getCurrentEnv(), target_container: document.getElementById('target-container').value, base_json: document.getElementById('base-td').value });
                alert("✅ " + res.message);
            } catch (e) { showMsg("❌ Error: " + e.message, true); }
        }

        async function fetchTD() {
            try {
                const data = await apiCall(`/api/v1/apps/${getCurrentApp()}/td?env=${getCurrentEnv()}`);
                document.getElementById('output-td').value = JSON.stringify(data, null, 2);
            } catch (e) { alert(e); }
        }

        function copyTD() { navigator.clipboard.writeText(document.getElementById('output-td').value); alert("JSON copiado!"); }

        // Agregar listeners para recargar datos cuando cambie la app o el entorno
        document.getElementById('app-selector').addEventListener('change', function() {
            if (!document.getElementById('view-variables').classList.contains('hidden')) {
                loadVariables();
                loadSecrets();
            }
        });

        document.getElementById('env-selector').addEventListener('change', function() {
            if (!document.getElementById('view-variables').classList.contains('hidden')) {
                loadVariables();
                loadSecrets();
            }
        });

        checkAuth();
    </script>
</body>
</html>
